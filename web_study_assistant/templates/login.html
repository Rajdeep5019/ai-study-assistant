<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; color: #2563eb; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; }
        input:focus { border-color: #2563eb; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .error { color: #dc2626; font-size: 13px; margin-bottom: 16px; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .link a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome Back</h1>
        <p>Login to your study assistant</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="link">Don't have an account? <a href="/register">Register</a></div>
    </div>
</body>
</html>
